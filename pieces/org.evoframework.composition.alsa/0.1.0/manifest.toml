[plugin]
name = "org.evoframework.composition.alsa"
# Keep in sync with this crate's Cargo.toml [package].version (PluginIdentity + packaging).
version = "0.1.0"
contract = 1

[target]
shelf = "audio.composition"
shape = 1

[kind]
instance = "singleton"
interaction = "respondent"

[transport]
type = "in-process"
exec = "<compiled-in>"

[trust]
class = "standard"

[prerequisites]
evo_min_version = "0.1.9"
os_family = "linux"
outbound_network = false
filesystem_scopes = []

[resources]
max_memory_mb = 32
max_cpu_percent = 5

[lifecycle]
hot_reload = "restart"
autostart = true
restart_on_crash = true
restart_budget = 5

[capabilities.respondent]
request_types = ["alsa.pipeline.compose"]
response_budget_ms = 2000
